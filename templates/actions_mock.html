<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Reservation | DealerOn Demo</title>
    <link rel="stylesheet" href="/assets/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/custom.css">
</head>
<body>

    <header>
        <div class="container d-flex justify-content-center">
            <a href="/"><img src="/assets/logo.png" alt="OnMarketplace" style="height: 40px;"></a>
        </div>
    </header>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="checkout-card">
                    <div class="test-banner">TEST MODE: No real payment will be processed.</div>
                    <div class="checkout-header">Complete Reservation</div>
                    <div class="card-body p-4">
                        
                        <div class="text-center mb-4">
                            <h5 class="text-muted mb-2">Reserve Vehicle</h5>
                            <h3 class="fw-bold">{{ car.title }}</h3>
                            <div class="badge bg-success fs-6 mt-2">Deposit: $350.00</div>
                        </div>

                        <form action="/api/reserve" method="POST">
                            <input type="hidden" name="item_id" value="{{ car.id }}">
                            
                           
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold text-secondary">Email Address</label>
                                <input type="email" class="form-control" name="email" placeholder="name@example.com" required>
                            </div>
                            
                             <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Full Name</label>
                                <input type="text" class="form-control bg-light" value="Bert Grey" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Phone Number</label>
                                <input type="text" class="form-control bg-light" value="+1 212-555-1234" readonly>
                            </div> 

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Demo Payment Details</label>
                                <input type="text" class="form-control bg-light mb-2" placeholder="**** **** **** 1234" disabled>
                                <div class="row g-2">
                                    <div class="col"><input type="text" class="form-control bg-light" placeholder="MM / YY" disabled></div>
                                    <div class="col"><input type="text" class="form-control bg-light" placeholder="CVC" disabled></div>
                                </div>
                            </div>

                            <button type="submit" class="btn-primary-brand mt-2">Pay & Reserve Now</button>
                            
                            <div class="text-center mt-3">
                                <a href="javascript:history.back()" class="text-decoration-none text-muted small">Cancel Transaction</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

<div class="bg-light py-5 border-top mt-5">
    <div class="container">
        <div class="row g-4">
            
            <div class="col-12 col-md-6 text-center px-4 px-md-5">
                <h6 class="text-muted fw-bold text-uppercase mb-4" style="letter-spacing: 1px; font-size: 12px;">Integrates with:</h6>
                <div class="d-flex justify-content-center align-items-center" style="height: 80px;">
                    <img id="integrations-img" src="" alt="Integration Logo" class="rotating-logo" style="max-height: 80px; max-width: 180px; object-fit: contain; display: none;">
                </div>
            </div>

            <div class="col-12 col-md-6 text-center px-4 px-md-5">
                <h6 class="text-muted fw-bold text-uppercase mb-4" style="letter-spacing: 1px; font-size: 12px;">Trusted by:</h6>
                <div class="d-flex justify-content-center align-items-center" style="height: 80px;">
                    <img id="trusted-img" src="" alt="Dealership Logo" class="rotating-logo" style="max-height: 80px; max-width: 180px; object-fit: contain; display: none;">
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    /* Smooth fade transition for the logos */
    .rotating-logo {
        transition: opacity 0.5s ease-in-out;
        opacity: 1;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Pull the dynamic file lists from Flask into JavaScript
        const integrations = {{ integration_logos | tojson | safe }};
        const clients = {{ client_logos | tojson | safe }};

        function setupRotation(imgId, imageList, folder) {
            const imgElement = document.getElementById(imgId);
            
            // If the folder is empty, just leave the image hidden
            if (!imageList || imageList.length === 0) return;
            
            // Show the image element
            imgElement.style.display = 'block';
            
            let currentIndex = 0;
            // Set the initial image
            imgElement.src = `/assets/${folder}/${imageList[0]}`;
            
            // Only rotate if there is more than 1 image
            if (imageList.length > 1) {
                setInterval(() => {
                    // 1. Fade out
                    imgElement.style.opacity = 0; 
                    
                    // 2. Wait for fade out, swap image, fade in
                    setTimeout(() => {
                        currentIndex = (currentIndex + 1) % imageList.length;
                        // Dynamically pull from the new folder paths
                        imgElement.src = `/assets/${folder}/${imageList[currentIndex]}`;
                        imgElement.style.opacity = 1; 
                    }, 500); // 500ms matches the CSS transition time
                    
                }, 2500); // Wait 2 seconds, then take 0.5s to fade = 2.5s total loop
            }
        }

        // Pass the exact folder names here so the image source builds correctly
        setupRotation('integrations-img', integrations, 'integration_logos');
        setupRotation('trusted-img', clients, 'client_logos');
    });
</script>




    <footer class="site-footer">
        <div class="container"> 
            <div class="footer-text">Trustap Ltd 2026</div>
            <div class="footer-subtext">☘️ Born in Ireland, Trusted Worldwide 🌍</div>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing...';
                submitBtn.style.opacity = "0.7";
                submitBtn.style.cursor = "wait";
                submitBtn.disabled = true; 
                setTimeout(function() { form.submit(); }, 1000);
            });
        });
    </script>
</body>
</html>
